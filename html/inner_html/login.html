    <main class="milieu">
      <section class="bloc">
        <h1 class="titre">Connexion</h1>
        <p class="texte">
          Saisissez votre email ou nom d'utilisateur et votre mot de passe pour
          continuer.
        </p>

        <div class="formulaire">
          <label class="champ">
            <span class="etiquette">Email ou nom d'utilisateur</span>
            <input
              id="email-input"
              type="text"
              name="email"
              placeholder="••••••••"
              class="saisie"
            />
          </label>
          <div class="userinfo" id="userinfo">
            <ul>
              <li>nom d'utilisateur ou email est incorrect</li>
            </ul>
          </div>

          <label class="champ">
            <span class="etiquette">Mot de passe</span>
            <input
              id="password-input"
              type="password"
              name="password"
              placeholder="••••••••"
              class="saisie"
            />
          </label>
          <div class="userpassword" id="userpassword">
            <ul>
              <li>mot de passe incorrect</li>
            </ul>
          </div>

          <div class="ligne">
            <label class="souvenir">
              <input type="checkbox" name="remember" class="case" />
              <span>Se souvenir de moi</span>
            </label>
            <a href="#" class="oubli">Mot de passe oublié ?</a>
          </div>

          <button type="button" class="envoi" id="envoi">Se connecter</button>
        </div>

        <p class="pied">
          Pas encore de compte ? <a href="registre.html">Créer un compte</a>
        </p>
      </section>
    </main>
    <script src="../../js/main.js"></script>
    <script src="../../js/inner-js/login.js"></script>
