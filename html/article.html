        <main class="contenu">
            <aside class="aside">
                <h2>ajuster votre voyage</h2>
                <div class="groupe">
                    <h3>Type de vol</h3>
                    <label for="vol-aller-simple">
                        <input id="vol-aller-simple" type="checkbox">
                        Aller simple
                    </label>
                    <label for="vol-aller-retour">
                        <input id="vol-aller-retour" type="checkbox">
                        Aller-retour
                    </label>
                    <label for="vol-multi-destinations">
                        <input id="vol-multi-destinations" type="checkbox">
                        Multi-destinations
                    </label>
                </div>
                <div class="groupe">
                    <h3>Classe</h3>
                    <label for="classe-economique">
                        <input id="classe-economique" type="checkbox">
                        Économique
                    </label>
                    <label for="classe-business">
                        <input id="classe-business" type="checkbox">
                        Business
                    </label>
                    <label for="classe-premiere">
                        <input id="classe-premiere" type="checkbox">
                        Première classe
                    </label>
                </div>
                <div class="groupe">
                    <h3>Prix</h3>
                    <label for="prix-minimum">
                        Prix minimum
                        <input id="prix-minimum" type="number" placeholder="0">
                    </label>
                    <label for="prix-maximum">
                        Prix maximum
                        <input id="prix-maximum" type="number"
                            placeholder="10000">
                    </label>
                </div>
                <div class="groupe">
                    <h3>Évaluation</h3>
                    <label for="evaluation-5-etoiles">
                        <input id="evaluation-5-etoiles" type="checkbox">
                        5 étoiles
                    </label>
                    <label for="evaluation-4-etoiles">
                        <input id="evaluation-4-etoiles" type="checkbox">
                        4 étoiles
                    </label>
                    <label for="evaluation-3-etoiles">
                        <input id="evaluation-3-etoiles" type="checkbox">
                        3 étoiles
                    </label>
                </div>
                <div class="groupe">
                    <h3>Hôtel</h3>
                    <label for="hotel-inclus">
                        <input id="hotel-inclus" type="checkbox">
                        Hôtel inclus
                    </label>
                    <label for="hotel-sans">
                        <input id="hotel-sans" type="checkbox">
                        Sans hôtel
                    </label>
                    <label for="hotel-petit-dejeuner">
                        <input id="hotel-petit-dejeuner" type="checkbox">
                        Petit déjeuner inclus
                    </label>
                </div>
                <div class="groupe">
                    <h3>Continent</h3>
                    <label for="continent-europe">
                        <input id="continent-europe" type="checkbox">
                        Europe
                    </label>
                    <label for="continent-asie">
                        <input id="continent-asie" type="checkbox">
                        Asie
                    </label>
                    <label for="continent-afrique">
                        <input id="continent-afrique" type="checkbox">
                        Afrique
                    </label>
                    <label for="continent-amerique">
                        <input id="continent-amerique" type="checkbox">
                        Amérique
                    </label>
                    <label for="continent-oceanie">
                        <input id="continent-oceanie" type="checkbox">
                        Océanie
                    </label>
                </div>
                <div class="groupe">
                    <h3>Offres</h3>
                    <label for="offre-reduction">
                        <input id="offre-reduction" type="checkbox">
                        Réduction incluse
                    </label>
                    <label for="offre-sans-reduction">
                        <input id="offre-sans-reduction" type="checkbox">
                        Sans réduction
                    </label>
                </div>
            </aside>
            <section id="section" class="section">
            </section>
        </main>
        <div id="iframe-reservation">
        </div>
